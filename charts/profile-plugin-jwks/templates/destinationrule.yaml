---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  labels:
    app: jwks
    teknoir.org/plugin: jwks
  name: jwks
  namespace: {{ .Release.Namespace }}
spec:
  host: jwks.{{ .Release.Namespace }}.svc.cluster.local
  exportTo:
    - "teknoir"
    - "teknoir-system"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
