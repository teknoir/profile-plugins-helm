---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: prometheus
  name: prometheus
  namespace: {{ .Release.Namespace }}
  annotations:
    teknoir.org/plugin: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "{{ .Values.persistentVolumeClaimSize }}"
