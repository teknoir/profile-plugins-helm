{{- $namespace := .Values.namespace | default .Release.Namespace -}}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    release: teknoir
  name: custom-device-controller-monitor
  namespace: {{ $namespace }}
spec:
  jobLabel: device-controller-stats
  namespaceSelector:
    any: true
  podMetricsEndpoints:
    - interval: 15s
      path: /metrics
      relabelings:
        - action: keep
          regex: manager
          sourceLabels:
            - __meta_kubernetes_pod_container_name
  selector:
    matchExpressions:
      - key: kustomize.component
        operator: In
        values:
          - device-controller
