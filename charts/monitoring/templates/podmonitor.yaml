---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: custom-backstage-monitor
  namespace: {{ $namespace }}
  labels:
    release: teknoir
spec:
  jobLabel: backstage-svc-search
  podMetricsEndpoints:
    - port: http-metrics
      interval: 15s
  selector:
    matchLabels:
      app: backstage-api
  namespaceSelector:
    any: true