{{- $password := (include "postgres.password" .) -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
  labels:
    app: postgres
    teknoir.org/plugin: postgres
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
