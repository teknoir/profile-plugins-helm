---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app: alertmanager
    teknoir.org/plugin: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: http-alertmanager-web
      protocol: TCP
      port: 80
      targetPort: 9093
    - name: http-alertmanager-noistio
      protocol: TCP
      port: 9093
      targetPort: 9093
