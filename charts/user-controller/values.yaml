# GitOps values for user-controller

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/teknoir-mgmt/controllers/user-controller
  tag: 20260318-194139
  pullPolicy: Always

imagePullSecrets:
  - name: gcr-json-key

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Annotations to add to the service account
  annotations: {}

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  projectId: teknoir
  userIdHeader: X-Auth-Request-Email
  userIdPrefix:
  mailClientApiKey: ""
  webDomain: teknoir.cloud
