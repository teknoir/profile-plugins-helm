# GitOps values
namespace: teknoir-system

# Istio integration configuration
istio:
  gateway:
    name: teknoir-gateway
    namespace: istio-system
  auth:
    # We use Harbor's native OIDC integration instead of oauth2-proxy
    # to avoid breaking Docker/Helm CLI workflows.
    enabled: false

# Domain and naming conventions
domain: "teknoir.cloud"
hostname: "harbor.teknoir.cloud"

# The Harbor subchart configuration
harbor:
  expose:
    type: none
    tls:
      enabled: false

    # We use "clusterIP" type to enable the internal harbor-proxy (nginx)
    # as the single backend for Istio VirtualService.
#    type: clusterIP
#    tls:
#      # Istio handles TLS at the gateway, so we disable it for the internal proxy.
#      enabled: false
#    clusterIP:
#      name: harbor-proxy
#      ports:
#        httpPort: 80

  externalURL: ""

  # Persistence configuration following the repo's pattern of using hostPath for local/initial setups
  # or allowing override via PVCs.
  persistence:
    enabled: true
    resourcePolicy: "keep"
    hostPathPrefix: /opt/teknoir/harbor
    persistentVolumeClaim:
      registry:
        existingClaim: harbor-registry-pvc
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 500Gi
      jobservice:
        existingClaim: harbor-jobservice-pvc
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 1Gi
      database:
        existingClaim: harbor-database-pvc
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 5Gi
      redis:
        existingClaim: harbor-redis-pvc
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 1Gi
      trivy:
        existingClaim: harbor-trivy-pvc
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 5Gi

  # Fix for hostPath permission issues on all components that use persistent volumes
  database:
    internal:
      extrInitContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: database-data
              mountPath: /var/lib/postgresql/data

  redis:
    internal:
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 999:999 /var/lib/redis"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/redis

  trivy:
    enabled: true
    initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 10000:10000 /home/scanner/.cache"]
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /home/scanner/.cache

  registry:
    existingSecret: "harbor-secret"
    existingSecretKey: "REGISTRY_HTTP_SECRET"
    initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 10000:10000 /storage"]
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: registry-data
            mountPath: /storage

  jobservice:
    existingSecret: "harbor-secret"
    existingSecretKey: "JOBSERVICE_SECRET"
    initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 10000:10000 /var/log/jobs"]
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: job-logs
            mountPath: /var/log/jobs

  # Secret management
  # Reference the secret generated by scripts/gen-harbor-secrets.sh
  existingSecretAdminPassword: "harbor-secret"
  existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"
  existingSecretSecretKey: "harbor-secret"

  core:
    existingSecret: "harbor-secret"
    # Note: 'secret' is the default key in core.existingSecret
    existingXsrfSecret: "harbor-secret"
    existingXsrfSecretKey: "CSRF_KEY"
