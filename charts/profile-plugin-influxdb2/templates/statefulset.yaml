---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb2
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: influxdb2
    app.kubernetes.io/instance: influxdb2
    teknoir.org/plugin: influxdb2
    owner: teknoir
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb2
      app.kubernetes.io/instance: influxdb2
  serviceName: "influxdb2"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influxdb2
        app.kubernetes.io/instance: influxdb2
        owner: teknoir
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: influxdb2
      serviceAccountName: influxdb2
      containers:
        - name: influxdb2
          image: "influxdb:{{ .Values.influxVersion }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          env:
            - name: INFLUXD_HTTP_IDLE_TIMEOUT
              value: 60m0s
            - name: INFLUXD_SESSION_LENGTH
              value: '60'
            - name: INFLUXD_SESSION_RENEW_DISABLED
              value: 'false'
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: admin
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb2-auth
                  key: admin-password
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: influxdata
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: default
            - name: DOCKER_INFLUXDB_INIT_RETENTION
              value: 0s
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb2-auth
                  key: admin-token
            - name: INFLUXD_BOLT_PATH
              value: /var/lib/influxdb2/influxd.bolt
            - name: INFLUXD_ENGINE_PATH
              value: /var/lib/influxdb2
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          resources: {}
