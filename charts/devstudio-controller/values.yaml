# GitOps values for devstudio-controller.

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/teknoir-mgmt/controllers/devstudio-controller
  tag: 20260319-092223
  pullPolicy: Always

imagePullSecrets:
  - name: gcr-json-key

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  kubectl.kubernetes.io/default-container: manager
  prometheus.io/scrape: "true"

podLabels:
  sidecar.istio.io/inject: "false"

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  useIstio: "true"
  istioGateway: "istio-system/teknoir-gateway"
  podLabels: "gcp-cred-secret=user-gcp-sa,gcp-cred-secret-filename=user-gcp-sa.json"
  projectId: "teknoir"
  domain: "teknoir.cloud"
  addFsgroup: "false"
